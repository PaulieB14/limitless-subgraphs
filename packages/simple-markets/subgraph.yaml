specVersion: 1.3.0
schema:
  file: ./schema.graphql
description: Limitless Simple Markets — CTF + Exchange (v1/v2/v3) on Base
indexerHints:
  prune: auto

dataSources:
  # ========== Conditional Tokens Framework ==========
  - kind: ethereum
    name: CTF
    network: base
    source:
      address: "0xC9c98965297Bc527861c898329Ee280632B76e18"
      abi: CTF
      startBlock: 15916136
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Condition
        - Split
        - Merge
        - Redemption
        - UserPosition
        - User
      abis:
        - name: CTF
          file: ./abis/CTF.json
      eventHandlers:
        - event: ConditionPreparation(indexed bytes32,indexed address,indexed bytes32,uint256)
          handler: handleConditionPreparation
        - event: ConditionResolution(indexed bytes32,indexed address,indexed bytes32,uint256,uint256[])
          handler: handleConditionResolution
        - event: PositionSplit(indexed address,address,indexed bytes32,indexed bytes32,uint256[],uint256)
          handler: handlePositionSplit
        - event: PositionsMerge(indexed address,address,indexed bytes32,indexed bytes32,uint256[],uint256)
          handler: handlePositionsMerge
        - event: PayoutRedemption(indexed address,indexed address,indexed bytes32,bytes32,uint256[],uint256)
          handler: handlePayoutRedemption
        - event: TransferSingle(indexed address,indexed address,indexed address,uint256,uint256)
          handler: handleTransferSingle
        - event: TransferBatch(indexed address,indexed address,indexed address,uint256[],uint256[])
          handler: handleTransferBatch
      file: ./src/ctf.ts

  # ========== CTF Exchange v1 ==========
  - kind: ethereum
    name: ExchangeV1
    network: base
    source:
      address: "0xa4409D988CA2218d956BeEFD3874100F444f0DC3"
      abi: Exchange
      startBlock: 26043405
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Market
        - Trade
        - User
        - GlobalStats
      abis:
        - name: Exchange
          file: ./abis/Exchange.json
      eventHandlers:
        - event: OrderFilled(indexed bytes32,indexed address,indexed address,uint256,uint256,uint256,uint256,uint256)
          handler: handleOrderFilled
        - event: OrdersMatched(indexed bytes32,indexed address,uint256,uint256,uint256,uint256)
          handler: handleOrdersMatched
        - event: TokenRegistered(indexed uint256,indexed uint256,indexed bytes32)
          handler: handleTokenRegistered
      file: ./src/exchange.ts

  # ========== CTF Exchange v2 ==========
  - kind: ethereum
    name: ExchangeV2
    network: base
    source:
      address: "0xF1De958F8641448A5ba78c01f434085385Af096D"
      abi: Exchange
      startBlock: 39507768
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Market
        - Trade
        - User
        - GlobalStats
      abis:
        - name: Exchange
          file: ./abis/Exchange.json
      eventHandlers:
        - event: OrderFilled(indexed bytes32,indexed address,indexed address,uint256,uint256,uint256,uint256,uint256)
          handler: handleOrderFilled
        - event: OrdersMatched(indexed bytes32,indexed address,uint256,uint256,uint256,uint256)
          handler: handleOrdersMatched
        - event: TokenRegistered(indexed uint256,indexed uint256,indexed bytes32)
          handler: handleTokenRegistered
      file: ./src/exchange.ts

  # ========== CTF Exchange v3 ==========
  - kind: ethereum
    name: ExchangeV3
    network: base
    source:
      address: "0x05c748E2f4DcDe0ec9Fa8DDc40DE6b867f923fa5"
      abi: Exchange
      startBlock: 39598606
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Market
        - Trade
        - User
        - GlobalStats
      abis:
        - name: Exchange
          file: ./abis/Exchange.json
      eventHandlers:
        - event: OrderFilled(indexed bytes32,indexed address,indexed address,uint256,uint256,uint256,uint256,uint256)
          handler: handleOrderFilled
        - event: OrdersMatched(indexed bytes32,indexed address,uint256,uint256,uint256,uint256)
          handler: handleOrdersMatched
        - event: TokenRegistered(indexed uint256,indexed uint256,indexed bytes32)
          handler: handleTokenRegistered
      file: ./src/exchange.ts
